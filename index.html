<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McGill Music Storefront</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">McGill Music</p>
        <h1>Dark trap beats. Direct checkout.</h1>
        <p class="hero-text">
          Clean storefront. No extra noise. Pick the beat and check out.
        </p>
        <div class="hero-actions">
          <a href="#catalog" class="primary-link">Open Catalog</a>
          <a href="https://www.youtube.com/watch?v=lUyZZvRIj0Q" class="ghost-link">Listen First</a>
        </div>
      </div>
      <div class="hero-panel">
        <div class="hero-stat">
          <span class="hero-stat-label">Featured</span>
          <strong>Night Pressure</strong>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-label">Next up</span>
          <strong>SATMORNING</strong>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-label">Checkout</span>
          <strong>PayPal</strong>
        </div>
      </div>
    </header>

    <main>
      <section id="catalog" class="section">
        <div class="section-heading">
          <p class="eyebrow">Catalog</p>
          <h2>Ready now</h2>
        </div>
        <div id="catalog-grid" class="catalog-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
